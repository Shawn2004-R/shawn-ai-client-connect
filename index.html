<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Setup Portal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 440px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            color: #1e293b;
            margin: 0 0 15px 0;
        }
        p {
            color: #64748b;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: #2563eb;
            color: white;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            transition: background-color 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Link Your Google Workspace</h1>
        <p>Click the button below to authorize the secure background sync for your custom clothing business automation.</p>
        
        <!-- THE INVITE BUTTON -->
        <a id="authButton" href="#" class="btn">Connect Workspace Account</a>
    </div>

    <script>
        // We will insert your invisible handshake link here in the next step
        const inviteLink = "YOUR_FUTURE_HANDSHAKE_LINK";
        document.getElementById("authButton").href = inviteLink;
    </script>

</body>
</html>
