<!DOCTYPE html>
<html lang="en">
<head>

    <title>Connection Successful</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;

            font-size: 50px;
            color: #22c55e;

        }
        h1 {
            font-size: 24px;
            color: #1e293b;
            margin: 0 0 10px 0;
        }
        p {
            color: #64748b;
            font-size: 16px;
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✓</div>
        <h1>Connection Successful</h1>
        <p>Your Google Workspace has been securely linked to your automation engine. You can safely close this window now.</p>
